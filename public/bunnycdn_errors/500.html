<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Onetime Secret - Server Error</title>
    <style>
      @font-face {
        font-family: "Zilla Slab";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src:
          url("/fonts/ZillaSlab-Regular.woff2") format("woff2"),
          url("/fonts/ZillaSlab-Regular.woff") format("woff");
      }

      @font-face {
        font-family: "Zilla Slab";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src:
          url("/fonts/ZillaSlab-SemiBold.woff2") format("woff2"),
          url("/fonts/ZillaSlab-SemiBold.woff") format("woff");
      }

      @font-face {
        font-family: "Zilla Slab";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src:
          url("/fonts/ZillaSlab-Bold.woff2") format("woff2"),
          url("/fonts/ZillaSlab-Bold.woff") format("woff");
      }

      :root {
        --brand-500: #dc4a22;
        --brand-600: #c43d1b;
        --brandcomp-500: #23b5dd;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-300: #d1d5db;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        background-color: var(--gray-50);
        color: var(--gray-900);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        line-height: 1.5;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        justify-content: center;
        align-items: center;
      }

      .error-card {
        position: relative;
        background-color: white;
        border-radius: 0.5rem;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 500px;
        padding: 2rem;
        text-align: center;
        overflow: hidden;
      }

      .error-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          rgba(220, 74, 34, 0.05) 0%,
          rgba(35, 181, 221, 0.1) 50%,
          rgba(220, 74, 34, 0.05) 100%
        );
        background-size: 200% 100%;
        animation: gradient-x 5s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes gradient-x {
        0%,
        100% {
          background-position: left center;
        }
        50% {
          background-position: right center;
        }
      }

      .animated-border {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(
          to right,
          var(--brand-500),
          var(--brandcomp-500),
          var(--brand-500)
        );
        background-size: 200% 100%;
        animation: gradient-x 5s ease-in-out infinite;
      }

      .header {
        margin-bottom: 2rem;
        position: relative;
        z-index: 1;
      }

      .brand-text {
        font-family: "Zilla Slab", Georgia, serif;
        font-size: 2rem;
        color: var(--brand-600);
      }

      .error-code {
        font-family: "Zilla Slab", Georgia, serif;
        font-size: 4rem;
        font-weight: 700;
        color: var(--brand-500);
        margin-bottom: 0.5rem;
        line-height: 1;
        position: relative;
        z-index: 1;
      }

      .error-title {
        font-family: "Zilla Slab", Georgia, serif;
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--gray-800);
        margin-bottom: 1rem;
        position: relative;
        z-index: 1;
      }

      .error-description {
        color: var(--gray-600);
        position: relative;
        z-index: 1;
      }

      .error-description + .error-description {
        margin-top: 1.5rem;
      }

      .action-link {
        display: inline-block;
        margin-top: 1.5rem;
        color: var(--brand-600);
        text-decoration: none;
        font-weight: 500;
        position: relative;
        z-index: 1;
      }

      .action-link:hover {
        text-decoration: underline;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: var(--gray-900);
          color: var(--gray-100);
        }

        .error-card {
          background-color: var(--gray-800);
          border: 1px solid var(--gray-700);
        }

        .error-card::before {
          background: linear-gradient(
            90deg,
            rgba(220, 74, 34, 0.1) 0%,
            rgba(35, 181, 221, 0.15) 50%,
            rgba(220, 74, 34, 0.1) 100%
          );
        }

        .error-title {
          color: var(--gray-100);
        }

        .error-description {
          color: var(--gray-300);
        }

        .action-link {
          color: var(--brandcomp-500);
        }
      }

      @media (max-width: 640px) {
        .container {
          padding: 1rem;
        }
        .error-card {
          padding: 1.5rem;
        }
        .error-code {
          font-size: 3rem;
        }
        .error-title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div
        class="error-card"
        role="alert">
        <div class="animated-border"></div>
        <div class="header">
          <h1 class="brand-text">Onetime Secret</h1>
        </div>
        <div class="error-code">500</div>
        <h2 class="error-title">Something Went Wrong</h2>
        <p class="error-description">
          We encountered an unexpected error. Our team has been notified and is
          working on it.
        </p>
        <p class="error-description">Please try again in a few moments.</p>
      </div>
      <a
        href="/"
        class="action-link"
        >Go to Homepage</a
      >
    </div>
  </body>
</html>
